<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figurines de Moda — Zatana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-bg:      #f5c6e0;
      --pink-stripe:  #e8a8cc;
      --card-bg:      #fce8f3;
      --pink-dark:    #c472a0;
      --pink-mid:     #d48ab8;
      --pink-light:   #f0b8d8;
      --text-main:    #8a3f65;
      --text-body:    #7a4060;
      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'Nunito', sans-serif;
      --shadow-card:  0 8px 40px rgba(180, 80, 130, 0.13);
    }

    body {
      min-height: 100vh;
      font-family: var(--font-body);
      background-color: var(--pink-bg);
      background-image:
        repeating-linear-gradient(
          to right,
          transparent 0px, transparent 60px,
          rgba(255,255,255,0.55) 60px, rgba(255,255,255,0.55) 120px,
          transparent 120px, transparent 160px,
          var(--pink-stripe) 160px, var(--pink-stripe) 163px,
          transparent 163px, transparent 220px,
          rgba(255,255,255,0.55) 220px, rgba(255,255,255,0.55) 280px
        );
      padding-top: 80px;
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 40px;
      background: rgba(252,232,243,0.72);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(212,138,184,0.25);
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; height: 44px; }
    .nav-logo img { height: 44px; width: auto; display: block; }
    .nav-divider { width: 1px; height: 22px; background: var(--pink-light); opacity: 0.7; }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a {
      font-family: var(--font-display); font-size: 1rem; font-weight: 400;
      color: var(--text-main); text-decoration: none; letter-spacing: 0.05em;
      position: relative; transition: color 0.2s;
    }
    .nav-links a.active, .nav-links a:hover { color: var(--pink-dark); }
    .nav-links a::after {
      content: ''; position: absolute; left: 0; bottom: -3px;
      width: 0; height: 1.5px; background: var(--pink-dark); transition: width 0.25s ease;
    }
    .nav-links a.active::after, .nav-links a:hover::after { width: 100%; }
    .nav-hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; background: none; border: none; padding: 4px;
    }
    .nav-hamburger span {
      display: block; width: 24px; height: 2px;
      background: var(--pink-dark); border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .nav-drawer {
      display: none; position: fixed; top: 60px; left: 0; right: 0;
      background: rgba(252,232,243,0.97); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212,138,184,0.2);
      z-index: 99; padding: 24px 32px 28px; flex-direction: column; gap: 20px;
    }
    .nav-drawer.open { display: flex; }
    .nav-drawer a {
      font-family: var(--font-display); font-size: 1.25rem; font-weight: 400;
      color: var(--text-main); text-decoration: none; letter-spacing: 0.04em;
      padding: 6px 0; border-bottom: 1px solid rgba(212,138,184,0.15); transition: color 0.2s;
    }
    .nav-drawer a:hover { color: var(--pink-dark); }

    /* ── Page header ── */
    .page-header {
      max-width: 960px; margin: 32px auto 0; padding: 0 20px;
    }

    /* Botón volver — pill con fondo */
    .page-header__back {
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 600;
      color: var(--pink-dark); text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--card-bg);
      border: 1.5px solid var(--pink-light);
      border-radius: 999px;
      padding: 6px 16px;
      box-shadow: 0 2px 8px rgba(180,80,130,0.10);
      transition: background 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
    }
    .page-header__back:hover {
      background: var(--pink-light);
      box-shadow: 0 4px 16px rgba(180,80,130,0.18);
    }

    /* Card que envuelve título + subtítulo */
    .page-header__card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(180,80,130,0.13);
      padding: 28px 36px 24px;
    }

    .page-header__title {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(2rem, 5vw, 3.2rem); color: var(--pink-dark);
      text-transform: uppercase; letter-spacing: -0.01em; line-height: 1;
    }
    .page-header__sub {
      font-family: var(--font-body); font-weight: 400;
      font-size: 0.95rem; color: var(--text-body); margin-top: 8px;
    }

    /* ── Gallery ── */
    .gallery {
      max-width: 960px; margin: 32px auto 60px; padding: 0 20px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }
    .gallery__item {
      border-radius: 16px; overflow: hidden;
      background: var(--card-bg); box-shadow: var(--shadow-card);
      cursor: zoom-in; position: relative; aspect-ratio: 2 / 3;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .gallery__item:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 48px rgba(180,80,130,0.22);
    }
    .gallery__item img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .gallery__item:hover img { transform: scale(1.04); }
    .gallery__item::after {
      content: '🔍'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; background: rgba(196,114,160,0.12);
      opacity: 0; transition: opacity 0.25s;
    }
    .gallery__item:hover::after { opacity: 1; }

    /* ── Lightbox ── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(90,20,50,0.80); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox__img {
      max-width: min(88vw, 700px); max-height: 88vh;
      border-radius: 16px; border: 4px solid var(--pink-light);
      box-shadow: 0 24px 80px rgba(90,20,50,0.5);
      object-fit: contain; animation: lb-in 0.25s ease; cursor: default;
    }
    .lightbox__nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(252,232,243,0.18); border: 1.5px solid var(--pink-light);
      color: var(--pink-light); font-size: 1.6rem;
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s, color 0.2s; backdrop-filter: blur(4px);
    }
    .lightbox__nav:hover { background: rgba(252,232,243,0.4); color: var(--pink-dark); }
    .lightbox__prev { left: 20px; }
    .lightbox__next { right: 20px; }
    .lightbox__close {
      position: absolute; top: 20px; right: 24px;
      background: none; border: none; color: var(--pink-light);
      font-size: 2rem; cursor: pointer; opacity: 0.8;
      transition: opacity 0.2s; line-height: 1;
    }
    .lightbox__close:hover { opacity: 1; }
    .lightbox__counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-body); font-size: 0.8rem;
      color: rgba(240,184,216,0.7); letter-spacing: 0.1em;
    }
    @keyframes lb-in {
      from { opacity: 0; transform: scale(0.90); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .navbar { padding: 0 20px; }
      .nav-links, .nav-divider { display: none; }
      .nav-hamburger { display: flex; }
      .gallery { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .lightbox__nav { width: 38px; height: 38px; font-size: 1.2rem; }
      .lightbox__prev { left: 8px; }
      .lightbox__next { right: 8px; }
    }
    @media (max-width: 400px) { .gallery { grid-template-columns: 1fr; } }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <header class="navbar" role="banner">
    <a class="nav-logo" href="index.html" aria-label="Inicio — Zatana">
      <img src="ElementosPaginaWeb/Logo%20Nabvar.png" alt="Logo Zatana" />
    </a>
    <div class="nav-divider" aria-hidden="true"></div>
    <ul class="nav-links" role="list">
      <li><a href="index.html">Sobre mí</a></li>
      <li><a href="figurines_moda.html" class="active">Figurines</a></li>
      <li><a href="fichas_tecnicas.html">Fichas Técnicas</a></li>
      <li><a href="colecciones.html">Colecciones</a></li>
      <li><a href="trabajos_analogos.html">Análogos</a></li>
    </ul>
    <button class="nav-hamburger" aria-label="Abrir menú" aria-expanded="false"
      aria-controls="nav-drawer-fig" onclick="toggleMenu(this)">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="nav-drawer" id="nav-drawer-fig" aria-label="Menú principal">
    <a href="index.html"             onclick="closeMenu()">Sobre mí</a>
    <a href="figurines_moda.html"    onclick="closeMenu()">Figurines de Moda</a>
    <a href="fichas_tecnicas.html"   onclick="closeMenu()">Fichas Técnicas</a>
    <a href="colecciones.html"       onclick="closeMenu()">Colecciones</a>
    <a href="trabajos_analogos.html" onclick="closeMenu()">Trabajos Análogos</a>
  </nav>

  <header class="page-header">
    <a class="page-header__back" href="index.html">← Volver</a>
    <div class="page-header__card">
      <h1 class="page-header__title">Figurines de Moda</h1>
      <p class="page-header__sub">Ilustración · vestuario · diseño editorial</p>
    </div>
  </header>

  <main>
    <div class="gallery">
      <div class="gallery__item" onclick="openLightbox(0)">
        <img src="Trabajos/Figurines_Moda/1.webp" alt="Figurín 1" loading="lazy" />
      </div>
      <div class="gallery__item" onclick="openLightbox(1)">
        <img src="Trabajos/Figurines_Moda/2.webp" alt="Figurín 2" loading="lazy" />
      </div>
      <div class="gallery__item" onclick="openLightbox(2)">
        <img src="Trabajos/Figurines_Moda/3.webp" alt="Figurín 3" loading="lazy" />
      </div>
      <div class="gallery__item" onclick="openLightbox(3)">
        <img src="Trabajos/Figurines_Moda/4.webp" alt="Figurín 4" loading="lazy" />
      </div>
      <div class="gallery__item" onclick="openLightbox(4)">
        <img src="Trabajos/Figurines_Moda/5.webp" alt="Figurín 5" loading="lazy" />
      </div>
      <div class="gallery__item" onclick="openLightbox(5)">
        <img src="Trabajos/Figurines_Moda/6.webp" alt="Figurín 6" loading="lazy" />
      </div>
      <div class="gallery__item" onclick="openLightbox(6)">
        <img src="Trabajos/Figurines_Moda/14.webp" alt="Figurín 14" loading="lazy" />
      </div>
      <div class="gallery__item" onclick="openLightbox(7)">
        <img src="Trabajos/Figurines_Moda/304.webp" alt="Figurín 304" loading="lazy" />
      </div>
      <div class="gallery__item" onclick="openLightbox(8)">
        <img src="Trabajos/Figurines_Moda/Breakdown.webp" alt="Breakdown" loading="lazy" />
      </div>
    </div>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true"
    aria-label="Imagen ampliada" onclick="handleLbClick(event)">
    <button class="lightbox__close" onclick="closeLightbox()" aria-label="Cerrar">✕</button>
    <button class="lightbox__nav lightbox__prev"
      onclick="navigate(-1); event.stopPropagation();" aria-label="Anterior">‹</button>
    <img class="lightbox__img" id="lb-img" src="" alt="" />
    <button class="lightbox__nav lightbox__next"
      onclick="navigate(1); event.stopPropagation();" aria-label="Siguiente">›</button>
    <span class="lightbox__counter" id="lb-counter"></span>
  </div>

  <script>
    const images = [
      { src: 'Trabajos/Figurines_Moda/1.webp',         alt: 'Figurín 1' },
      { src: 'Trabajos/Figurines_Moda/2.webp',         alt: 'Figurín 2' },
      { src: 'Trabajos/Figurines_Moda/3.webp',         alt: 'Figurín 3' },
      { src: 'Trabajos/Figurines_Moda/4.webp',         alt: 'Figurín 4' },
      { src: 'Trabajos/Figurines_Moda/5.webp',         alt: 'Figurín 5' },
      { src: 'Trabajos/Figurines_Moda/6.webp',         alt: 'Figurín 6' },
      { src: 'Trabajos/Figurines_Moda/14.webp',        alt: 'Figurín 14' },
      { src: 'Trabajos/Figurines_Moda/304.webp',       alt: 'Figurín 304' },
      { src: 'Trabajos/Figurines_Moda/Breakdown.webp', alt: 'Breakdown' },
    ];

    let current = 0;

    function openLightbox(i) {
      current = i; updateLb();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function handleLbClick(e) {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    }
    function navigate(dir) {
      current = (current + dir + images.length) % images.length;
      updateLb();
    }
    function updateLb() {
      document.getElementById('lb-img').src = images[current].src;
      document.getElementById('lb-img').alt = images[current].alt;
      document.getElementById('lb-counter').textContent =
        (current + 1) + ' / ' + images.length;
    }
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft')  navigate(-1);
    });

    function toggleMenu(btn) {
      const drawer = document.getElementById('nav-drawer-fig');
      const open   = drawer.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', open);
      btn.setAttribute('aria-label', open ? 'Cerrar menú' : 'Abrir menú');
    }
    function closeMenu() {
      const drawer = document.getElementById('nav-drawer-fig');
      const btn    = document.querySelector('.nav-hamburger');
      drawer.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
      btn.setAttribute('aria-label', 'Abrir menú');
    }
  </script>

</body>
</html>
